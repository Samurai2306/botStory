services:
  postgres:
    image: postgres:15-alpine
    container_name: botstory_postgres
    environment:
      POSTGRES_DB: botstory
      POSTGRES_USER: botstory_user
      POSTGRES_PASSWORD: botstory_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botstory_user -d botstory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: botstory_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botstory_backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://botstory_user:botstory_pass@postgres:5432/botstory
      REDIS_URL: redis://redis:6379
      SECRET_KEY: PEd/J9mfeF2MIXRnlJOr+U1xcYOOsr1mXm9RMres0trOYe4Az+W41UEqR9lx37YeTF/zSZkqzbPtuWmgNBdimw==
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      # Source for the "КОММИТЫ" section in the Community page
      GITHUB_REPO: Samurai2306/botStory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: botstory_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Прокси Vite → сервис backend (из контейнера фронта localhost:8000 недоступен)
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
